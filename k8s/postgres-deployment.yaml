apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f compose.prod.yml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f compose.prod.yml -o k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: postgres
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: moca-test-db
            - name: POSTGRES_PASSWORD
              value: duylongadminpass
            - name: POSTGRES_USER
              value: duylong
          image: postgres:16-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U duylong -d moca-test-db
            failureThreshold: 5
            periodSeconds: 5
            timeoutSeconds: 5
          name: moca-postgres
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: moca-pg-data
      restartPolicy: Always
      volumes:
        - name: moca-pg-data
          persistentVolumeClaim:
            claimName: moca-pg-data
