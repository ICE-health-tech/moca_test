# Local full stack: docker compose up -d --build
# Remote DB (192.168.22.111): backend uses backend/.env — skip local postgres:
#   docker compose up -d --build backend frontend
#
# Local postgres only (dev without app):
#   docker compose --profile local-db up -d postgres

services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: moca-postgres
    environment:
      POSTGRES_DB: moca-test-db
      POSTGRES_USER: duylong
      POSTGRES_PASSWORD: duylongadminpass
    ports:
      - "5432:5432"
    volumes:
      - moca_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duylong -d moca-test-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: moca-backend
    env_file: ./backend/.env
    environment:
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5

  frontend:
    build: ./frontend
    image: duylongcontainer/moca-frontend:latest
    container_name: moca-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: moca-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.44"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"

  minio:
    profiles: ["local-minio"]
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: moca-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: moca_minio
      MINIO_ROOT_PASSWORD: moca_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - moca_minio_data:/data

volumes:
  moca_pg_data:
  moca_minio_data:
