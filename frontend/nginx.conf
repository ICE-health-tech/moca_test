# MoCA frontend — nginx in Docker (compose service name: backend)
# Flow: browser → :80 nginx → static dist/ | /api → backend:8080

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # MoCA submit may include drawing payloads in JSON
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # LAYOUT: API proxy → Spring Boot (docker compose network)
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Vite hashed assets — long cache
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA shell — always revalidate after deploy
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # LAYOUT: React Router — all other paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
