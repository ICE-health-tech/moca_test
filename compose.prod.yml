# VM / server deploy — pull from Docker Hub (no local build).
# CI pushes images on every push to main (see .github/workflows/docker-publish.yml).
# Proxmox VMs are usually linux/amd64 — GitHub Actions builds that platform automatically.
#
# GitHub secrets (one-time): DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Manual push (optional):
#   docker buildx build --platform linux/amd64 -t duylongcontainer/moca-backend:latest --push ./backend
#   docker buildx build --platform linux/amd64 -t duylongcontainer/moca-frontend:latest --push ./frontend
#
# On the server (amd64):
#   cp backend/.env.example .env   # edit DB_*, REDIS_*, MINIO_*
#   docker login -u duylongcontainer
#   docker compose -f compose.prod.yml pull
#   docker compose -f compose.prod.yml up -d

services:
  backend:
    image: duylongcontainer/moca-backend:latest
    platform: linux/amd64
    container_name: moca-backend
    restart: unless-stopped
    env_file: backend/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5
    labels:
      - com.centurylinklabs.watchtower.enable=true

  frontend:
    image: duylongcontainer/moca-frontend:latest
    platform: linux/amd64
    container_name: moca-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: moca-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
