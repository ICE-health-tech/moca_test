# VM / server deploy — pull from Docker Hub (no local build).
# Proxmox VMs are usually linux/amd64 — build with buildx before push (see below).
#
# On Mac (Apple Silicon) push amd64 images for the server:
#   docker buildx create --use --name moca-builder 2>/dev/null || docker buildx use moca-builder
#   docker buildx build --platform linux/amd64 -t duylongcontainer/moca-backend:latest --push ./backend
#   docker buildx build --platform linux/amd64 -t duylongcontainer/moca-frontend:latest --push ./frontend
#
# On the server (amd64):
#   cp .env.prod.example .env          # set JWT_SECRET (≥48 chars)
#   docker login -u duylongcontainer
#   docker compose -f compose.prod.yml pull
#   docker compose -f compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: moca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: moca-test-db
      POSTGRES_USER: duylong
      POSTGRES_PASSWORD: duylongadminpass
    ports:
      - "5433:5432"
    volumes:
      - moca_pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duylong -d moca-test-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: duylongcontainer/moca-backend:latest
    platform: linux/amd64
    container_name: moca-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: moca-test-db
      DB_USER: duylong
      DB_PASSWORD: duylongadminpass
      MINIO_ENABLED: ${MINIO_ENABLED:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://192.168.22.19:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-moca-drawings}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-false}
      REDIS_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5
    labels:
      - com.centurylinklabs.watchtower.enable=true

  frontend:
    image: duylongcontainer/moca-frontend:latest
    platform: linux/amd64
    container_name: moca-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: moca-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"

volumes:
  moca_pg_data:
