spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.22.13}:${DB_PORT:5432}/${DB_NAME:moca-prod}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: moca-prod
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

redis:
  enabled: ${REDIS_ENABLED:true}
  host: ${REDIS_HOST}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD}
  ssl: ${REDIS_SSL:true}

minio:
  enabled: ${MINIO_ENABLED:false}
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
