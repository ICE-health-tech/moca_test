# Build & push MoCA images to Docker Hub on push to main.
#
# One-time GitHub setup (repo → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  = duylongcontainer
#   DOCKERHUB_TOKEN     = Docker Hub → Account Settings → Security → Access Token
#
# Server (Watchtower in compose.prod.yml) pulls :latest every ~5 min after push.

name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - compose.prod.yml
      - .github/workflows/docker-publish.yml

env:
  REGISTRY_USER: duylongcontainer
  PLATFORM: linux/amd64

jobs:
  backend:
    name: moca-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY_USER }}/moca-backend:latest
            ${{ env.REGISTRY_USER }}/moca-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: moca-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY_USER }}/moca-frontend:latest
            ${{ env.REGISTRY_USER }}/moca-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_USE_MOCK=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
